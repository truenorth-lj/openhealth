<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>離線中 — Open Health</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: #f9fafb;
      color: #111827;
      padding: 1.5rem;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    button {
      background: #16a34a;
      color: #fff;
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>目前無法連線</h1>
    <p>請確認網路連線後再試一次。</p>
    <button onclick="window.location.reload()">重新整理</button>
  </div>
</body>
</html>
