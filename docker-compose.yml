services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openhealth
      POSTGRES_PASSWORD: openhealth
      POSTGRES_DB: openhealth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openhealth"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://openhealth:openhealth@db:5432/openhealth
      BETTER_AUTH_SECRET: change-me-to-a-random-string
      BETTER_AUTH_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
